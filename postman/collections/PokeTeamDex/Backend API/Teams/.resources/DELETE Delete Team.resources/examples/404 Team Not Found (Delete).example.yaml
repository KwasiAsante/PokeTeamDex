$kind: http-example
name: '404 Team Not Found (Delete)'
request:
  url: '{{baseUrl}}/teams/{{team_id}}'
  method: DELETE
response:
  statusCode: 404
  statusText: Not Found
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "detail": "Team not found"
      }
