      value: application/json
  body:
    type: json
    content: |-
      {
        "access_token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwiZXhwIjoxNzE3MDAwMDAwfQ.abc123",
        "token_type": "bearer"
      }
