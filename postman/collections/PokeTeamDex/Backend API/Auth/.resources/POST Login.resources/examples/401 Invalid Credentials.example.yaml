$kind: http-example
name: 401 Invalid Credentials
request:
  url: '{{baseUrl}}/auth/login'
  method: POST
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "detail": "Invalid credentials"
      }
