$kind: http-example
name: 200 Current User
request:
  url: '{{baseUrl}}/auth/me'
  method: GET
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "id": 1,
        "email": "user@example.com"
      }
