$kind: http-example
name: '404 Team Not Found (Slots)'
request:
  url: '{{baseUrl}}/teams/{{team_id}}/slots'
  method: GET
response:
  statusCode: 404
  statusText: Not Found
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "detail": "Team not found"
      }
