$kind: http-example
name: 200 Slot Upserted
request:
  url: '{{baseUrl}}/teams/{{team_id}}/slots/{{slot_number}}'
  method: PUT
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "slot_number": 1,
        "pokemon_id": 25,
        "nickname": "Pikachu",
        "team_id": 1
      }
