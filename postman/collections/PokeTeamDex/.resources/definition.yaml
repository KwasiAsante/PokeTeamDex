$kind: collection
name: PokeTeamDex
variables:
  - key: baseUrl
    value: 'http://localhost:8000'
    type: default
    enabled: true
  - key: pokeApiBase
    value: 'https://pokeapi.co/api/v2'
    type: default
    enabled: true
  - key: token
    value: ''
    type: default
    enabled: true
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
