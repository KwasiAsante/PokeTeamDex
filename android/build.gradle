allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Flutter expects APK artifacts at <project_root>/build/app/outputs/…
// This redirect is required for flutter build apk to locate the output.
rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

gradle.afterProject { proj ->
    if (proj.plugins.hasPlugin("com.android.library") || proj.plugins.hasPlugin("com.android.application")) {
        proj.android.defaultConfig.minSdkVersion 24
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
