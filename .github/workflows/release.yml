name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  FLUTTER_VERSION: stable

jobs:
  # ── Create the GitHub Release first ──────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "PokeTeamDex ${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            --draft=false

  # ── Android APK ──────────────────────────────────────────────────────────
  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/release.jks

      - name: Write key.properties
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../release.jks
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/PokeTeamDex-${{ needs.create-release.outputs.tag }}.apk

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "build/app/outputs/flutter-apk/PokeTeamDex-${{ needs.create-release.outputs.tag }}.apk" \
            --clobber

  # ── Windows MSI + EXE ─────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX extensions
        run: |
          wix extension add --global WixToolset.UI.wixext/4.0.5
          wix extension add --global WixToolset.Util.wixext/4.0.5

      - name: Generate WiX component list from Flutter build output
        run: |
          $buildDir = "$PWD\build\windows\x64\runner\Release"
          $uid = 0
          $lines = [System.Collections.Generic.List[string]]::new()
          $lines.Add('<?xml version="1.0" encoding="UTF-8"?>')
          $lines.Add('<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">')
          $lines.Add('  <Fragment>')
          $lines.Add('    <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">')
          Get-ChildItem $buildDir -Recurse -File | ForEach-Object {
            $uid++
            $rel  = $_.FullName.Substring($buildDir.Length + 1)
            $dir  = [IO.Path]::GetDirectoryName($rel)
            $sub  = if ($dir) { " Subdirectory=`"$dir`"" } else { "" }
            $lines.Add("      <Component Id=`"C$uid`"$sub><File Source=`"$($_.FullName)`" KeyPath=`"yes`" /></Component>")
          }
          $lines.Add('    </ComponentGroup>')
          $lines.Add('  </Fragment>')
          $lines.Add('</Wix>')
          $lines -join "`n" | Set-Content "windows\installer\components.wxs" -Encoding utf8NoBOM

      - name: Build MSI
        run: |
          $version = "${{ needs.create-release.outputs.tag }}".TrimStart('v')
          wix build windows/installer/installer.wxs windows/installer/components.wxs `
            -d Version=$version `
            -d BuildDir="$PWD\build\windows\x64\runner\Release" `
            -d IconFile="$PWD\windows\runner\resources\app_icon.ico" `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -o "PokeTeamDex-${{ needs.create-release.outputs.tag }}-Setup.msi"

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build EXE installer
        run: |
          $version = "${{ needs.create-release.outputs.tag }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=$version `
            /DBuildDir="$PWD\build\windows\x64\runner\Release" `
            /DOutputDir="$PWD" `
            /DOutputFilename="PokeTeamDex-${{ needs.create-release.outputs.tag }}-Setup" `
            windows\installer\installer.iss

      - name: Upload installers to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}-Setup.msi" \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}-Setup.exe" \
            --clobber

  # ── Linux desktop bundle ─────────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libfuse2 flatpak flatpak-builder libayatana-appindicator3-1 libayatana-appindicator3-dev libdbusmenu-gtk3-4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Bundle tray native dependencies
        run: |
          LIBDIR=build/linux/x64/release/bundle/lib
          for lib in \
            /usr/lib/x86_64-linux-gnu/libayatana-appindicator3.so.1 \
            /usr/lib/x86_64-linux-gnu/libayatana-indicator3.so.7 \
            /usr/lib/x86_64-linux-gnu/libayatana-ido3-0.4.so.0 \
            /usr/lib/x86_64-linux-gnu/libdbusmenu-glib.so.4 \
            /usr/lib/x86_64-linux-gnu/libdbusmenu-gtk3.so.4; do
            [ -e "$lib" ] && cp -L "$lib" "$LIBDIR/$(basename "$lib")"
          done

      - name: Package tar.gz
        run: |
          BUNDLE=build/linux/x64/release/bundle
          cp linux/flatpak/io.github.KwasiAsante.PokeTeamDex.desktop \
            "$BUNDLE/io.github.KwasiAsante.PokeTeamDex.desktop"
          cp assets/images/app_icon.png \
            "$BUNDLE/io.github.KwasiAsante.PokeTeamDex.png"
          cp linux/install.sh "$BUNDLE/install.sh"
          chmod +x "$BUNDLE/install.sh"
          cd "$BUNDLE"
          tar -czf "$OLDPWD/PokeTeamDex-${{ needs.create-release.outputs.tag }}-linux-x64.tar.gz" .

      - name: Build AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          mkdir -p PokeTeamDex.AppDir
          cp -r build/linux/x64/release/bundle/. PokeTeamDex.AppDir/

          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=$(dirname "$SELF")\nexec "$HERE/poke_team_dex" "$@"\n' \
            > PokeTeamDex.AppDir/AppRun
          chmod +x PokeTeamDex.AppDir/AppRun

          printf '[Desktop Entry]\nName=PokeTeamDex\nExec=poke_team_dex\nIcon=io.github.KwasiAsante.PokeTeamDex\nType=Application\nCategories=Game;\n' \
            > PokeTeamDex.AppDir/io.github.KwasiAsante.PokeTeamDex.desktop

          cp assets/images/app_icon.png PokeTeamDex.AppDir/io.github.KwasiAsante.PokeTeamDex.png
          ln -s io.github.KwasiAsante.PokeTeamDex.png PokeTeamDex.AppDir/.DirIcon

          ARCH=x86_64 ./appimagetool PokeTeamDex.AppDir \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}-x86_64.AppImage"

      - name: Add Flathub remote
        run: flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-freedesktop-24.08

      - name: Install Flatpak runtime
        run: |
          flatpak install --user --noninteractive flathub \
            org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          # flatpak-builder fetches module sources (e.g. intltool from
          # launchpad.net) over the network; transient timeouts to those
          # external hosts shouldn't fail the whole release. --force-clean
          # makes each attempt safe to retry from scratch.
          for attempt in 1 2 3; do
            if flatpak-builder --user --force-clean --disable-rofiles-fuse \
                 --repo=flatpak-repo \
                 flatpak-build-dir linux/flatpak/manifest.yml; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "flatpak-builder failed after 3 attempts" >&2
              exit 1
            fi
            echo "flatpak-builder attempt $attempt failed; retrying in 30s..."
            sleep 30
          done
          flatpak build-bundle flatpak-repo \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}.flatpak" \
            io.github.KwasiAsante.PokeTeamDex

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}-linux-x64.tar.gz" \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}-x86_64.AppImage" \
            "PokeTeamDex-${{ needs.create-release.outputs.tag }}.flatpak" \
            --clobber

  # ── Backend Docker image ──────────────────────────────────────────────────
  build-backend-docker:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/poketeamdex-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Notify backend (runs in same workflow to bypass GITHUB_TOKEN restriction) ─
  # notify-update.yml with `on: release: published` never fires when the release
  # is created by GITHUB_TOKEN — GitHub blocks cross-workflow triggers from tokens.
  notify-backend:
    needs: [build-android, build-windows, build-linux, build-backend-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Notify backend of new release
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          NOTIFY_UPDATE_SECRET: ${{ secrets.NOTIFY_UPDATE_SECRET }}
        run: |
          curl -f -X POST "${BACKEND_URL}/admin/notify-update" \
            -H "Content-Type: application/json" \
            -H "X-Notify-Secret: ${NOTIFY_UPDATE_SECRET}" \
            -d "{\"version\":\"${{ needs.create-release.outputs.tag }}\",\"release_url\":\"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.create-release.outputs.tag }}\"}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5
