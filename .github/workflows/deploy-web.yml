name: Deploy Web

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # action-hosting-deploy shells out to `npx firebase-tools@latest deploy`,
      # which resolves node/npx from the runner's system default (now Node 24)
      # regardless of which Node version the Actions runtime itself uses to
      # execute the action's own entrypoint. Node 24 has a node-fetch/http.Agent
      # regression (nodejs/node#63989) that throws a false-positive "Premature
      # close" on keep-alive socket reuse; firebase-tools retries on that error,
      # but the retried call is the non-idempotent "create release" request, so
      # it fails with FAILED_PRECONDITION ("... is the current active version")
      # even though the original call already succeeded. Put Node 20 ahead of
      # the system default on PATH so the npx-spawned firebase-tools process
      # avoids the regression. Remove once firebase-tools/Node fix this upstream.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          channelId: live
          projectId: poketeamdex
