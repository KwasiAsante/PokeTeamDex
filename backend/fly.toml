# fly.toml — Fly.io deployment config
# Replace "poketeamdex-api" with your chosen app name (must be globally unique)

app = "poketeamdex-api"
primary_region = "lhr"  # London — change to nearest: ord=Chicago, iad=Virginia, lax=LA, sin=Singapore

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
