services:
  db:
    image: postgres:16
    container_name: poketeamdex_db
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: poketeamdex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d poketeamdex"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: poketeamdex_api
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@db:5432/poketeamdex
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
      DEBUG: "true"
      PS_DATA_DIR: /app/shared/ps_data
      SHARED_DIR: /app/shared
      NOTIFY_UPDATE_SECRET: dev-admin-secret
    depends_on:
      db:
        condition: service_healthy
    command: sh /app/start.sh --reload
    volumes:
      - .:/app
      - ../shared:/app/shared

volumes:
  postgres_data:
